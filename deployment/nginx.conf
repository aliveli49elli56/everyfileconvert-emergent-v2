# EveryFileConvert — Nginx Reverse Proxy Configuration
# Production deployment for Hetzner VPS / Docker Compose
#
# Usage:
#   nginx -c /path/to/this/nginx.conf
#   Or via Docker Compose: docker compose --profile nginx up
#
# Replace: everyfileconvert.com with your actual domain
# SSL: Use Certbot or Caddy for automatic SSL (see Caddyfile)

upstream nextjs_app {
    # Round-robin to multiple instances for horizontal scaling
    server app:3000;
    # Uncomment for multiple instances:
    # server app_2:3000;
    # server app_3:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name everyfileconvert.com www.everyfileconvert.com;

    # ACME challenge for Let's Encrypt (optional if using Caddy)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main server
server {
    listen 443 ssl http2;
    server_name everyfileconvert.com www.everyfileconvert.com;

    # SSL Configuration (managed by Certbot or manual)
    ssl_certificate     /etc/ssl/certs/everyfileconvert.com.crt;
    ssl_certificate_key /etc/ssl/private/everyfileconvert.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # REQUIRED for EveryFileConvert WASM/SharedArrayBuffer:
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # Static file caching (Next.js immutable assets)
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Public directory
    location /public/ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=86400";
    }

    # Large file uploads (conversion files can be large)
    client_max_body_size 500M;
    client_body_timeout  120s;

    # Main proxy
    location / {
        proxy_pass       http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;

        # CORS / WASM headers — must be forwarded
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }
}
